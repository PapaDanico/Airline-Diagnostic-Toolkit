# Netlify configuration — DN Airline Diagnostic Toolkit (static site)
[build]
  publish = "."
  # No build step: vanilla HTML/CSS/JS, served as-is.
  command = ""

# Redirect/rewrite rules live in _redirects (Netlify's plain-text format),
# not here — Netlify applies _redirects ahead of [[redirects]] in this
# file when both define the same path, so a duplicate copy here would be
# silently overridden config that only risks drifting out of sync with
# the file that's actually authoritative. Keep _redirects as the single
# source of truth for routing.
